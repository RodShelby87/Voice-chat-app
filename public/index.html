<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceChat Simple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙 Switch Theme</button>

    <div id="auth-container" class="container">
        <h2>Join VoiceChat</h2>
        <input type="text" id="username" placeholder="Your name">
        <button id="create-btn">➕ Create Room</button>
        <hr>
        <input type="text" id="room-id-input" placeholder="Room ID to join">
        <button id="join-btn">🚪 Join Room</button>
        <p id="auth-error" style="color:red; display:none;"></p>
    </div>

    <div id="chat-container" class="container" style="display: none;">
        <h2 id="room-display">Room: </h2>

        <div id="user-list-container">
            <strong>In this room:</strong>
            <ul id="user-list"></ul>
        </div>

        <div class="volume-controls">
            <label>🔊 Room Volume
                <input type="range" id="room-volume" min="0" max="100" value="100">
            </label>
            <label>🎙️ My Volume
                <input type="range" id="my-volume" min="0" max="100" value="100">
            </label>
        </div>

        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
        <div class="voice-controls">
            <button id="mic-btn">🎤 Start Voice</button>
        </div>
    </div>

    <div id="audio-grid"></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
